<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    text-align: center;
    color: white;
}

/* FORM */
#formBox {
    margin-top: 200px;
    transition: 0.6s;
}

input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    padding: 12px 25px;
    border: none;
    background: #16a34a;
    color: white;
    border-radius: 10px;
    margin-top: 10px;
    font-size: 16px;
}

/* ANIMASI */
.fade-out {
    opacity: 0;
    transform: translateY(-40px);
}

/* HASIL */
#hasil {
    display: none;
    margin-top: 20px;
    animation: muncul 0.8s ease;
}

@keyframes muncul {
    from {opacity:0; transform: translateY(40px);}
    to {opacity:1; transform: translateY(0);}
}

/* GAMBAR */
img {
    width: 95%;
    max-width: 380px;
    border-radius: 12px;
}
</style>
</head>

<body>

<div id="formBox">
    <h2>CEK KELULUSAN</h2>
    <input type="text" id="nisn" placeholder="Masukkan NISN">
    <br>
    <button onclick="cek()">CEK</button>
</div>

<div id="hasil"></div>

<!-- MUSIK -->
<audio id="musik" src="musik.mp3" loop></audio>

<script>

/* DATA NISN → GAMBAR */
const data = [
{nisn:"3138840469", img:"1.png"},
{nisn:"3133721711", img:"2.png"},
{nisn:"0149653962", img:"3.png"},
{nisn:"3132128542", img:"4.png"},
{nisn:"3142121807", img:"5.png"},
{nisn:"3145980864", img:"6.png"},
{nisn:"3149874429", img:"7.png"},
{nisn:"3136563204", img:"8.png"},
{nisn:"3147581861", img:"9.png"},
{nisn:"3142466117", img:"10.png"},
{nisn:"3142612994", img:"11.png"},
{nisn:"3135389357", img:"12.png"},
{nisn:"0146644118", img:"13.png"},
{nisn:"3144807093", img:"14.png"},
{nisn:"3138229405", img:"15.png"},
{nisn:"3131510825", img:"16.png"},
{nisn:"3138644160", img:"17.png"},
{nisn:"3133735700", img:"18.png"}
];

let musikMulai = false;

function cek(){

    let nisn = document.getElementById("nisn").value.trim();
    let siswa = data.find(d => d.nisn === nisn);

    if(!siswa){
        alert("NISN tidak ditemukan");
        return;
    }

    // 🔊 musik (sekali saja, tidak restart)
    let audio = document.getElementById("musik");
    if(!musikMulai){
        audio.play().catch(()=>{});
        musikMulai = true;
    }

    let form = document.getElementById("formBox");
    let hasil = document.getElementById("hasil");

    form.classList.add("fade-out");

    setTimeout(()=>{
        form.style.display = "none";

        hasil.innerHTML = `<img src="${siswa.img}">`;
        hasil.style.display = "block";

    }, 500);
}
</script>

</body>
</html>
