<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelulusan</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url('bg.jpg') no-repeat;
    background-size: cover;
    background-position: center 30%;
    text-align: center;
    color: white;
}

/* container */
.container {
    margin-top: 220px;
}

/* teks */
h2, h3, p {
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
}

/* input */
input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
}

/* amplop */
.envelope {
    width: 220px;
    height: 140px;
    margin: 20px auto;
    position: relative;
    background: #16a34a;
    border-radius: 10px;
    cursor: pointer;
}

/* tutup */
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #22c55e;
    clip-path: polygon(0 0, 100% 0, 50% 60%);
    transition: 0.7s;
}

/* buka */
.open .flap {
    transform: rotateX(180deg);
}

/* sembunyikan form */
.hide {
    opacity: 0;
    transform: translateY(-30px);
    transition: 0.6s;
}

/* hasil */
#hasil {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.7s;
}

#hasil.show {
    opacity: 1;
    transform: translateY(0);
}

/* foto */
img {
    width: 120px;
    border-radius: 12px;
    margin-top: 10px;
}

/* status */
.lulus {
    color: #00ff88;
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div id="formBox">
    <h2>CEK KELULUSAN</h2>
    <input type="text" id="nisn" placeholder="Masukkan NISN">
</div>

<div class="envelope" onclick="buka()">
    <div class="flap"></div>
</div>

<div id="hasil"></div>

</div>

<audio id="musik" src="musik.mp3" loop></audio>

<script>

const data = [
{nisn:"3138840469", nama:"IKHFANUL SAPUTRA", ttl:"BATANG, 24 September 2013", foto:"1.jpg"},
{nisn:"3133721711", nama:"INDHIRA MAY NOVI ZULIANTY", ttl:"BATANG, 01 November 2013", foto:"2.jpg"},
{nisn:"0149653962", nama:"KAUMA SAFIYA SALSABILA RIZKY", ttl:"BOGOR, 13 Juli 2014", foto:"3.jpg"},
{nisn:"3132128542", nama:"KHAYLA ZAYAN UFAIRA", ttl:"BATANG, 26 Juni 2013", foto:"4.jpg"},
{nisn:"3142121807", nama:"LATIFATUL HIKMAH", ttl:"BATANG, 21 Mei 2014", foto:"5.jpg"},
{nisn:"3145980864", nama:"MICAYLA RAISYA PUTRI", ttl:"BATANG, 05 Januari 2014", foto:"6.jpg"},
{nisn:"3149874429", nama:"MIFTAKHUL JANNAH", ttl:"KENDAL, 07 April 2014", foto:"7.jpg"},
{nisn:"3136563204", nama:"MUHAMMAD DWI PRASETYO", ttl:"BATANG, 12 Oktober 2013", foto:"8.jpg"},
{nisn:"3147581861", nama:"MUHAMMAD FATIH AADIL AL BARRAA", ttl:"BATANG, 02 Januari 2014", foto:"9.jpg"},
{nisn:"3142466117", nama:"MUHAMMAD ILHAM MUNAZAL", ttl:"BATANG, 24 Februari 2014", foto:"10.jpg"},
{nisn:"3142612994", nama:"MUHAMMAD VIRZA NUR HIDAYATULLOH", ttl:"BATANG, 08 Mei 2014", foto:"11.jpg"},
{nisn:"3135389357", nama:"RAFAEL GALANG SAPUTRA", ttl:"BATANG, 20 Agustus 2013", foto:"12.jpg"},
{nisn:"0146644118", nama:"TAQIYA AZKATALIA", ttl:"KENDAL, 11 Februari 2014", foto:"13.jpg"},
{nisn:"3144807093", nama:"TIARA AULIA NISA", ttl:"BATANG, 28 Mei 2014", foto:"14.jpg"},
{nisn:"3138229405", nama:"TIRTA NUR ZAMMI", ttl:"JAKARTA, 22 September 2013", foto:"15.jpg"},
{nisn:"3131510825", nama:"YAHYA ANDIRJA SUSANTO", ttl:"BATANG, 31 Oktober 2013", foto:"16.jpg"},
{nisn:"3138644160", nama:"ZAHRA KURNIA", ttl:"BATANG, 26 Mei 2013", foto:"17.jpg"},
{nisn:"3133735700", nama:"ZAHWA ISLAH SOFYA", ttl:"BATANG, 17 November 2013", foto:"18.jpg"}
];

let musikMulai = false;

function buka(){

    let audio = document.getElementById("musik");

    // 🔊 PLAY SEKALI (tidak restart)
    if(!musikMulai){
        audio.play().catch(()=>{});
        musikMulai = true;
    }

    let nisn = document.getElementById("nisn").value.trim();
    let siswa = data.find(d => d.nisn === nisn);

    if(!siswa){
        alert("NISN tidak ditemukan");
        return;
    }

    let form = document.getElementById("formBox");
    let amplop = document.querySelector(".envelope");
    let hasil = document.getElementById("hasil");

    // animasi hilang
    form.classList.add("hide");

    // buka amplop
    amplop.classList.add("open");

    setTimeout(()=>{

        form.style.display = "none";
        amplop.style.display = "none";

        hasil.innerHTML = `
            <img src="${siswa.foto}">
            <h3>${siswa.nama}</h3>
            <p>${siswa.ttl}</p>
            <div class="lulus">DINYATAKAN LULUS</div>
        `;

        hasil.classList.add("show");

    }, 700);
}

</script>

</body>
</html>
