<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengumuman Kelulusan</title>

<style>
body {
    margin:0;
    font-family:Arial;
    text-align:center;
    background:#000;
    color:white;
}

/* HALAMAN */
.page {
    display:none;
    padding:20px;
    min-height:100vh;
}

.active {
    display:block;
    animation:fade 0.7s;
}

@keyframes fade {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}

/* GAMBAR */
img {
    width:100%;
    max-width:420px;
    margin:auto;
    display:block;
    border-radius:15px;
}

/* TOMBOL */
button {
    padding:12px 25px;
    border:none;
    background:#16a34a;
    color:white;
    border-radius:10px;
    margin-top:20px;
    font-size:16px;
}

/* FORM */
input {
    padding:12px;
    width:85%;
    border-radius:10px;
    border:none;
    font-size:16px;
    text-align:center;
}

/* BACKGROUND KHUSUS NISN */
#page3 {
    background: url('img/bg.png') no-repeat center;
    background-size: cover;
    position: relative;
}

/* OVERLAY GELAP */
#page3::before {
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

/* AGAR KONTEN DI ATAS OVERLAY */
#page3 * {
    position:relative;
}
</style>
</head>

<body>

<!-- MUSIK -->
<audio id="musik" src="musik.mp3" loop></audio>

<!-- PAGE 1 -->
<div id="page1" class="page active">
    <img src="img/sambutan1.png">
    <button onclick="nextPage(2)">Lanjut</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
    <img src="img/sambutan2.png">
    <button onclick="nextPage(3)">Lanjut</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
    <h2>CEK KELULUSAN</h2>
    <input type="text" id="nisn" placeholder="Masukkan NISN">
    <br>
    <button onclick="cek()">CEK</button>
</div>

<!-- HASIL -->
<div id="page4" class="page"></div>

<script>

/* DATA */
const data = [
{nisn:"3138840469", img:"img/1.png"},
{nisn:"3133721711", img:"img/2.png"},
{nisn:"0149653962", img:"img/3.png"},
{nisn:"3132128542", img:"img/4.png"},
{nisn:"3142121807", img:"img/5.png"},
{nisn:"3145980864", img:"img/6.png"},
{nisn:"3149874429", img:"img/7.png"},
{nisn:"3136563204", img:"img/8.png"},
{nisn:"3147581861", img:"img/9.png"},
{nisn:"3142466117", img:"img/10.png"},
{nisn:"3142612994", img:"img/11.png"},
{nisn:"3135389357", img:"img/12.png"},
{nisn:"0146644118", img:"img/13.png"},
{nisn:"3144807093", img:"img/14.png"},
{nisn:"3138229405", img:"img/15.png"},
{nisn:"3131510825", img:"img/16.png"},
{nisn:"3138644160", img:"img/17.png"},
{nisn:"3133735700", img:"img/18.png"}
];

/* MUSIK */
let musikMulai = false;

function playMusik(){
    let audio = document.getElementById("musik");
    if(!musikMulai){
        audio.play().catch(()=>{});
        musikMulai = true;
    }
}

/* PINDAH HALAMAN */
function nextPage(n){
    playMusik();

    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page"+n).classList.add("active");

    window.scrollTo(0,0);
}

/* CEK NISN */
function cek(){
    playMusik();

    let nisn = document.getElementById("nisn").value.trim();
    let siswa = data.find(d => d.nisn === nisn);

    if(!siswa){
        alert("NISN tidak ditemukan");
        return;
    }

    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));

    let hasil = document.getElementById("page4");
    hasil.innerHTML = `<img src="${siswa.img}">`;
    hasil.classList.add("active");

    window.scrollTo(0,0);
}

</script>

</body>
</html>
